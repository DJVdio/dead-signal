<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dead Signal · 数值 wiki</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'><rect width='16' height='16' fill='%230c0e0d'/><rect x='3' y='3' width='10' height='10' fill='%238fbf6a'/></svg>">
<!--
  Dead Signal 本地数值 wiki —— 纯静态单页，零 CDN、零外部依赖、离线可用。

  数据流：C# 是唯一事实源 → tools/WikiExtract 抽成 data/*.json → 你在这页上改 → 点保存 PUT 回 json
         → 之后由 agent 把 json 的改动落回 C# 并跑测试门禁。这页**不直接改代码**。

  加一个新分区：往 data/ 丢一个同结构的 json，再在 data/index.json 的 categories 里加一行。
  本页不认识任何具体分区——列、类型、配色全部由 json 里的 columns 元数据驱动。
-->
<style>
  :root {
    --bg:        #0c0e0d;
    --panel:     #141815;
    --panel-2:   #1b201d;
    --line:      #2a312c;
    --line-soft: #1f2521;
    --text:      #cbd3cc;
    --text-dim:  #7d887f;
    --text-mute: #545d56;
    --accent:    #8fbf6a;  /* 生存绿：可交互 / 主键 */
    --rust:      #b4462f;  /* 血锈红：锐伤 / 危险 / 脏 */
    --amber:     #c9963f;  /* 钝伤 / 警告 / 脏标记 */
    --steel:     #6f93a8;  /* 冷色：远程 / 信息 */
    --violet:    #8d78b8;
    --teal:      #58a08c;
    --dirty:     #d9a441;
  }

  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font: 13px/1.45 -apple-system, "PingFang SC", "Microsoft YaHei", "Helvetica Neue", sans-serif;
    display: flex; flex-direction: column;
    overflow: hidden;
  }
  .mono { font-family: "SF Mono", "JetBrains Mono", Menlo, Consolas, monospace; }

  /* ── 顶栏 ───────────────────────────────────────────── */
  header {
    display: flex; align-items: center; gap: 14px;
    padding: 0 14px; height: 46px; flex: 0 0 46px;
    background: var(--panel);
    border-bottom: 1px solid var(--line);
  }
  .brand {
    font-weight: 700; letter-spacing: .16em; font-size: 12px;
    color: var(--accent); text-transform: uppercase;
    font-family: "SF Mono", Menlo, monospace;
  }
  .brand span { color: var(--text-mute); }
  .spacer { flex: 1; }

  .status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--text-dim); }
  .dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-mute); }
  .dot.live { background: var(--accent); box-shadow: 0 0 6px var(--accent); }
  .dot.offline { background: var(--amber); }

  button {
    font: inherit; font-size: 12px;
    background: var(--panel-2); color: var(--text);
    border: 1px solid var(--line); border-radius: 2px;
    padding: 5px 11px; cursor: pointer;
  }
  button:hover:not(:disabled) { border-color: var(--text-mute); background: #232a25; }
  button:disabled { opacity: .38; cursor: not-allowed; }
  button.primary { background: #2c4a20; border-color: #4b7a37; color: #d6ecc4; }
  button.primary:hover:not(:disabled) { background: #375c28; }
  button.primary:disabled { background: var(--panel-2); border-color: var(--line); color: var(--text-mute); }

  /* ── 主体 ───────────────────────────────────────────── */
  main { flex: 1; display: flex; min-height: 0; }

  nav {
    flex: 0 0 176px; background: var(--panel);
    border-right: 1px solid var(--line);
    overflow-y: auto; padding: 8px 0;
  }
  nav .navitem {
    display: flex; align-items: center; gap: 8px;
    padding: 7px 14px; cursor: pointer;
    border-left: 2px solid transparent;
    color: var(--text-dim); font-size: 13px;
  }
  nav .navitem:hover { background: var(--panel-2); color: var(--text); }
  nav .navitem.active {
    background: var(--panel-2); color: var(--accent);
    border-left-color: var(--accent); font-weight: 600;
  }
  nav .navitem .count {
    margin-left: auto; font-size: 11px; color: var(--text-mute);
    font-family: "SF Mono", Menlo, monospace;
  }
  nav .navitem .pip {
    width: 6px; height: 6px; border-radius: 50%;
    background: var(--dirty); flex: 0 0 6px;
  }
  nav .navhead {
    padding: 10px 14px 5px; font-size: 10px; letter-spacing: .12em;
    color: var(--text-mute); text-transform: uppercase;
  }

  section.content { flex: 1; display: flex; flex-direction: column; min-width: 0; }

  .cathead { padding: 11px 16px 9px; border-bottom: 1px solid var(--line-soft); }
  .cathead h1 { margin: 0 0 3px; font-size: 15px; font-weight: 600; }
  .cathead .note { margin: 0; font-size: 12px; color: var(--text-dim); max-width: 92ch; line-height: 1.5; }
  .cathead .src { font-size: 11px; color: var(--text-mute); margin-top: 4px; font-family: "SF Mono", Menlo, monospace; }

  .toolbar {
    display: flex; align-items: center; gap: 8px; flex-wrap: wrap;
    padding: 8px 16px; border-bottom: 1px solid var(--line);
    background: var(--panel);
  }
  input[type=search], input.cell {
    font: inherit; background: #0d100e; color: var(--text);
    border: 1px solid var(--line); border-radius: 2px; padding: 4px 8px;
  }
  input[type=search] { width: 220px; }
  input[type=search]:focus, input.cell:focus { outline: none; border-color: var(--accent); }

  .filters { display: flex; gap: 5px; flex-wrap: wrap; align-items: center; }
  .fchip {
    font-size: 11px; padding: 2px 8px; border-radius: 9px; cursor: pointer;
    border: 1px solid var(--line); color: var(--text-dim); background: transparent;
    user-select: none;
  }
  .fchip:hover { border-color: var(--text-mute); }
  .fchip.on { background: #253022; border-color: var(--accent); color: var(--accent); }

  label.toggle { display: flex; align-items: center; gap: 5px; font-size: 12px; color: var(--text-dim); cursor: pointer; }

  /* ── 表 ───────────────────────────────────────────── */
  .tablewrap { flex: 1; overflow: auto; }
  table { border-collapse: separate; border-spacing: 0; width: max-content; min-width: 100%; }
  thead th {
    position: sticky; top: 0; z-index: 2;
    background: var(--panel-2);
    border-bottom: 1px solid var(--line);
    border-right: 1px solid var(--line-soft);
    padding: 6px 9px; text-align: left;
    font-size: 11px; font-weight: 600; color: var(--text-dim);
    white-space: nowrap; cursor: pointer; user-select: none;
  }
  thead th:hover { color: var(--text); }
  thead th .arrow { color: var(--accent); margin-left: 3px; }
  thead th.internal { color: var(--text-mute); background: #171a18; font-style: italic; }
  thead th.num { text-align: right; }

  tbody td {
    border-bottom: 1px solid var(--line-soft);
    border-right: 1px solid var(--line-soft);
    padding: 3px 9px; height: 27px;
    white-space: nowrap; max-width: 340px; overflow: hidden; text-overflow: ellipsis;
  }
  tbody tr:hover td { background: #171c18; }
  tbody tr.dirty td { background: #1d1a12; }
  tbody tr.dirty:hover td { background: #241f14; }

  td.editable { cursor: text; }
  td.editable:hover { box-shadow: inset 0 0 0 1px var(--line); }
  td.locked { color: var(--text-mute); cursor: not-allowed; }
  td.internal { color: var(--text-mute); background: #121412; font-size: 11px; font-family: "SF Mono", Menlo, monospace; cursor: not-allowed; }
  tbody tr:hover td.internal { background: #161816; }
  td.num { text-align: right; font-family: "SF Mono", Menlo, monospace; }
  td.name { font-weight: 600; color: var(--text); position: sticky; left: 0; z-index: 1; background: var(--bg); }
  tbody tr:hover td.name { background: #171c18; }
  tbody tr.dirty td.name { background: #1d1a12; }
  td.changed { box-shadow: inset 2px 0 0 var(--dirty); color: var(--dirty); }
  td.empty { color: var(--text-mute); }

  td.icon { width: 34px; padding: 1px 4px; text-align: center; position: sticky; left: 0; z-index: 1; background: var(--bg); }
  tbody tr:hover td.icon { background: #171c18; }
  tbody tr.dirty td.icon { background: #1d1a12; }
  td.icon img { width: 22px; height: 22px; object-fit: cover; object-position: 50% 22%; image-rendering: pixelated; vertical-align: middle; display: block; margin: auto; }
  td.icon .ph {
    width: 22px; height: 22px; margin: auto; border: 1px dashed var(--line);
    color: var(--text-mute); font-size: 9px; display: flex; align-items: center; justify-content: center;
  }
  td.name.sticky2 { left: 34px; }
  th.stick0 { position: sticky; left: 0; z-index: 3; }
  th.stick1 { position: sticky; left: 34px; z-index: 3; }
  table.no-icons td.name.sticky2, table.no-icons th.stick1 { left: 0; }

  /* 表头拖拽重排列顺序：可拖的列给抓握手势；拖动中的源列淡出；落点用侧边高亮示意插到前/后。 */
  th.col-draggable { cursor: grab; }
  th.col-draggable:active { cursor: grabbing; }
  th.col-dragging { opacity: 0.4; }
  th.col-drop-before { box-shadow: inset 2px 0 0 var(--accent); }
  th.col-drop-after  { box-shadow: inset -2px 0 0 var(--accent); }

  .chip {
    display: inline-block; padding: 1px 7px; border-radius: 3px;
    font-size: 11px; border: 1px solid transparent;
  }
  .bool { display: inline-block; width: 8px; height: 8px; border-radius: 50%; }
  .bool.yes { background: var(--accent); }
  .bool.no  { background: #2b332c; }

  input.cell { width: 100%; padding: 2px 5px; }
  textarea.cell {
    font: inherit; width: 100%; min-height: 76px;
    background: #0d100e; color: var(--text);
    border: 1px solid var(--accent); border-radius: 2px; padding: 4px 6px; resize: vertical;
  }
  textarea.cell:focus { outline: none; }
  td.editing { padding: 2px 4px; overflow: visible; white-space: normal; }

  /* ── 提示条 ───────────────────────────────────────── */
  #toast {
    position: fixed; bottom: 18px; left: 50%; transform: translateX(-50%);
    padding: 9px 18px; border-radius: 3px; font-size: 13px;
    background: var(--panel-2); border: 1px solid var(--line);
    opacity: 0; pointer-events: none; transition: opacity .18s; z-index: 50;
    max-width: 70vw;
  }
  #toast.show { opacity: 1; }
  #toast.ok   { border-color: var(--accent); color: #d6ecc4; background: #22301b; }
  #toast.err  { border-color: var(--rust);   color: #f0c8bd; background: #331a14; }

  /* 待同步的行：靠配色和划线一眼认出「这条还没进游戏」 */
  tbody tr.pending-new td { box-shadow: inset 0 1px 0 rgba(143,191,106,.18); }
  tbody tr.pending-new td.name { border-left: 2px solid var(--accent); }
  tbody tr.tombstone td {
    color: var(--text-mute); text-decoration: line-through;
    background: #17120f; opacity: .62;
  }
  tbody tr.tombstone:hover td { background: #1d1613; }
  tbody tr.tombstone td.name { border-left: 2px solid var(--rust); text-decoration: line-through; }
  tbody tr.tombstone td.icon img { filter: grayscale(1); opacity: .4; }

  /* 行尾删除钮：悬停才显形，免得一排 × 扰乱读表 */
  td.delcol, th.delcol { width: 30px; padding: 0 4px; text-align: center; border-right: none; }
  .delbtn {
    padding: 0; width: 19px; height: 19px; line-height: 1;
    background: transparent; border: 1px solid transparent; color: var(--text-mute);
    opacity: 0; font-size: 13px;
  }
  tbody tr:hover .delbtn { opacity: 1; }
  tbody tr.tombstone .delbtn { opacity: 1; color: var(--accent); }
  .delbtn:hover { color: var(--rust); border-color: var(--rust); background: #2a1512; }
  tbody tr.tombstone .delbtn:hover { color: var(--accent); border-color: var(--accent); background: #1f2a19; }

  .banner {
    padding: 7px 16px; font-size: 12px;
    background: #2b2312; border-bottom: 1px solid #5a4718; color: #e3c179;
  }
  .banner.info {
    background: #16201c; border-bottom: 1px solid #2c4034; color: var(--text-dim);
  }
  .banner.info b { color: var(--accent); }

  /* 「备注」列：用户写给 agent 的设计笔记（不是游戏数据）⇒ 视觉上和数据列区分开 */
  td.usernote { background: #16191c; }
  tbody tr:hover td.usernote { background: #1b1f23; }
  td.usernote:not(.empty) { color: #a8c8e0; border-left: 2px solid var(--steel); }
  td.usernote.empty { color: #3d4650; font-size: 11px; }
  thead th.usernote { color: var(--steel); background: #171b1f; }

  /* 多选面板（可装于哪些武器） */
  td.ms { cursor: pointer; }
  .mspanel {
    position: fixed; z-index: 60; width: 260px;
    background: var(--panel-2); border: 1px solid var(--accent); border-radius: 3px;
    box-shadow: 0 8px 28px rgba(0,0,0,.6);
    display: flex; flex-direction: column; max-height: 330px;
  }
  .mshead, .msfoot {
    display: flex; align-items: center; gap: 6px;
    padding: 6px 8px; border-bottom: 1px solid var(--line);
    font-size: 11px; color: var(--text-dim);
  }
  .msfoot { border-bottom: none; border-top: 1px solid var(--line); justify-content: flex-end; }
  .mshead button { padding: 2px 8px; font-size: 11px; margin-left: auto; }
  .mshead button + button { margin-left: 4px; }
  .mslist { overflow-y: auto; padding: 4px 0; flex: 1; }
  .msitem {
    display: flex; align-items: center; gap: 7px;
    padding: 3px 10px; font-size: 12px; cursor: pointer; color: var(--text-dim);
  }
  .msitem:hover { background: #232a25; }
  .msitem.on { color: var(--accent); }
  .msitem input { margin: 0; }

  /* DPS 两列：只读派生量，但它是调参时最该看的数 ⇒ 给它一点分量（等宽、偏亮），
     同时保持"只读"的视觉语义（不给可编辑的悬停框） */
  td.dps { font-family: "SF Mono", Menlo, monospace; text-align: right; color: #cfe0b8; font-weight: 600; }
  tbody tr:hover td.dps { color: #e2f0d2; }
  .banner b { color: #f2d79a; }
  .banner code { font-family: "SF Mono", Menlo, monospace; background: #1c1709; padding: 1px 5px; border-radius: 2px; }
  .hidden { display: none !important; }

  .empty-state { padding: 40px; text-align: center; color: var(--text-mute); }

  /* ── 页内分块表头行（按 group 归段）─────────────────── */
  tbody tr.grouphead td {
    position: sticky; left: 0;
    background: #10130f; border-bottom: 1px solid var(--line);
    border-top: 1px solid var(--line-soft);
    padding: 6px 10px; height: auto;
    white-space: nowrap; max-width: none; overflow: visible; text-overflow: clip;
  }
  tbody tr.grouphead:hover td { background: #10130f; }
  tbody tr.grouphead .gname {
    font-size: 11px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase;
    color: var(--accent);
  }
  tbody tr.grouphead .gcount {
    margin-left: 8px; font-size: 11px; color: var(--text-mute);
    font-family: "SF Mono", Menlo, monospace;
  }

  /* ── 视图切换 + 二级视图一级选择器 ─────────────────── */
  .viewswitch { display: flex; gap: 4px; align-items: center; }
  .viewswitch .vbtn {
    font-size: 11px; padding: 3px 10px; border-radius: 2px; cursor: pointer;
    border: 1px solid var(--line); color: var(--text-dim); background: var(--panel-2);
    user-select: none;
  }
  .viewswitch .vbtn:hover { border-color: var(--text-mute); color: var(--text); }
  .viewswitch .vbtn.on { background: #253022; border-color: var(--accent); color: var(--accent); }
  .picker {
    display: flex; gap: 5px; flex-wrap: wrap; align-items: center;
    padding: 8px 16px; border-bottom: 1px solid var(--line-soft); background: var(--panel);
  }
  .picker .plabel { font-size: 11px; color: var(--text-mute); margin-right: 3px; }

  /* ── 调查点流程图（内联 SVG）───────────────────────── */
  .graphwrap { flex: 1; overflow: auto; padding: 16px; background:
    radial-gradient(circle at 1px 1px, var(--line-soft) 1px, transparent 0) 0 0 / 22px 22px; }
  .graphwrap svg { display: block; }
  .graphwrap .gnode rect {
    fill: var(--panel-2); stroke: var(--line); stroke-width: 1;
    rx: 4; cursor: pointer;
  }
  .graphwrap .gnode:hover rect { stroke: var(--text-mute); }
  .graphwrap .gnode.start rect { stroke: var(--accent); stroke-width: 1.5; }
  .graphwrap .gnode .glabel { fill: var(--text); font-size: 12px; font-weight: 600; }
  .graphwrap .gnode .gsub { fill: var(--text-mute); font-size: 10px; font-family: "SF Mono", Menlo, monospace; }
  .graphwrap .gnode.danger-low   rect { fill: #16210f; }
  .graphwrap .gnode.danger-mid   rect { fill: #2a1f0d; }
  .graphwrap .gnode.danger-high  rect { fill: #2a1210; }
  .graphwrap .edge { fill: none; stroke: var(--text-mute); stroke-width: 1.4; }
  .graphwrap .edge.requireall { stroke: var(--rust); stroke-dasharray: 5 3; stroke-width: 1.6; }
  .graphwrap .edge-arrow { fill: var(--text-mute); }
  .graphwrap .edge-arrow.requireall { fill: var(--rust); }
  .graph-legend {
    display: flex; gap: 16px; flex-wrap: wrap; align-items: center;
    padding: 8px 16px; border-bottom: 1px solid var(--line-soft);
    font-size: 11px; color: var(--text-dim); background: var(--panel);
  }
  .graph-legend .lk { display: inline-flex; align-items: center; gap: 5px; }
  .graph-legend .swatch { width: 20px; height: 0; border-top: 2px solid var(--text-mute); }
  .graph-legend .swatch.requireall { border-top: 2px dashed var(--rust); }
  .graph-legend .swatch.startdot { width: 10px; height: 10px; border: 1.5px solid var(--accent); border-radius: 2px; }
</style>
</head>
<body>

<header>
  <div class="brand">Dead Signal <span>/ 数值 wiki</span></div>
  <div class="status">
    <span class="dot" id="conn-dot"></span>
    <span id="conn-text">连接中…</span>
  </div>
  <div class="spacer"></div>
  <span id="dirty-summary" style="font-size:12px;color:var(--dirty)"></span>
  <button id="btn-revert" disabled>撤销改动</button>
  <button id="btn-export">导出 JSON</button>
  <button id="btn-save" class="primary" disabled>保存</button>
</header>

<div class="banner info">
  这里改的是<b>设计表（JSON）</b>，不是游戏代码。改数值、<b>新增</b>、<b>删除</b>都要
  <b>让 agent 同步进 C#</b> 才会在游戏里生效——带「待同步进代码」标记的行就是还没进游戏的。
  改完跟 agent 说一声：「wiki 上改了 XX，同步进代码」。
</div>

<div id="dps-banner" class="banner hidden"></div>

<div id="offline-banner" class="banner hidden">
  <b>只读模式</b> —— 没连上本地服务，改动无法写回文件（但可以「导出 JSON」下载）。
  要能保存，在仓库根跑：<code>python3 tools/wiki-serve.py</code>，然后打开它打印的地址。
</div>

<main>
  <nav id="nav"></nav>
  <section class="content">
    <div class="cathead">
      <h1 id="cat-title">—</h1>
      <p class="note" id="cat-note"></p>
      <div class="src" id="cat-src"></div>
    </div>
    <div class="toolbar">
      <div class="viewswitch hidden" id="viewswitch"></div>
      <button id="btn-add" title="在这个分区末尾加一条新记录（一律追加末尾，不插队）">+ 新增一条</button>
      <input type="search" id="q" placeholder="搜索（名称/说明/任意列）…" autocomplete="off">
      <div class="filters" id="filters"></div>
      <div class="spacer"></div>
      <label class="toggle"><input type="checkbox" id="show-internal"> 显示内部 id 列</label>
    </div>
    <div class="picker hidden" id="picker"></div>
    <div class="tablewrap" id="tablewrap">
      <div class="empty-state">加载中…</div>
    </div>
    <div class="graphwrap hidden" id="graphwrap"></div>
  </section>
</main>

<div id="toast"></div>

<!-- file:// 直接打开时的降级数据源（浏览器不允许 fetch 本地文件）。有服务时以服务上的 json 为准。 -->
<script src="data/bundle.js" onerror="window.__bundleMissing=true"></script>
<script>
"use strict";

// ═══════════════════════════════════════════════════════════════════
// 新增 / 删除
//
// ⚠️ 这两个动作**只改 JSON 设计表，不改游戏代码** —— 在网页上删掉一把武器，游戏里那把枪还在。
// 所以新增/删除的行会一直带着「待同步进代码」的标记，直到 agent 把改动落进 C#。
// 删除走**软删除（墓碑）**：行留在表里、划掉显示。理由很实在——若直接从 JSON 抹掉，
// 下次重跑抽取器又会从代码里把它捡回来，用户的删除就"自己撤销"了。
// 等 agent 把 C# 里那条也删了，重跑时墓碑自动消失（TableMerge.cs 里有完整的生命周期）。
// ═══════════════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════════════
// DPS 的实时预览
//
// 🔴 **公式的事实源是引擎**（C# `WeaponDps`）—— JSON 里的 dps / dualDps 都是它算好写下来的。
// 这里之所以还得在 JS 里算一遍，只为一件事：**你改一格数值，DPS 立刻跟着变**（不用等保存+重跑）。
//
// 那不就成了"第二份事实源"吗？—— 用两道闸挡住：
//   ① **系数不写死**：0.70 这类数由引擎放进 index.json 的 dpsGripFactors 带下来。
//   ② **加载时逐行对账**：拿这里算的结果跟引擎写进 JSON 的 dps 比对，对不上就弹横幅、
//      并**退回只显示引擎的值**。⇒ 引擎哪天改了公式形状而这里没跟上，**会被当场抓出来**，
//      而不是悄悄给用户一个错的数字让他照着调平衡。
// ═══════════════════════════════════════════════════════════════════
function gripFactors() {
  return (S.index && S.index.dpsGripFactors) || { oneHanded: 1, twoHanded: 1, dualWield: 0.7 };
}

/** 一个攻击周期的秒数。🔴 冷却在整轮连发**之后**才起算；持握系数只除在冷却上，不碰连发间隔。 */
function cycleSeconds(r, factor) {
  const burst = Math.max(1, Number(r.burstCount) || 1);
  const gap = Math.max(0, Number(r.burstInterval) || 0);
  const cooldown = (Number(r.attackInterval) || 0) / factor;
  return (burst - 1) * gap + cooldown;
}

function dpsWith(r, factor) {
  const cycle = cycleSeconds(r, factor);
  if (!(cycle > 0)) return 0;
  const burst = Math.max(1, Number(r.burstCount) || 1);
  const pellets = Math.max(1, Number(r.pelletCount) || 1);
  const expected = ((Number(r.damageMin) || 0) + (Number(r.damageMax) || 0)) / 2;
  return expected * pellets * burst / cycle;
}

/** 重算一行的两个 DPS 格（改了伤害/间隔/连发/弹丸/可双持，立刻反映出来）。 */
function recomputeDps(r) {
  const f = gripFactors();
  r.dps = round4(dpsWith(r, r.twoHanded ? f.twoHanded : f.oneHanded));
  // 不可双持 ⇒ null ⇒ 显示「—」，不是 0、更不是编一个数
  r.dualDps = r.canDualWield ? round4(2 * dpsWith(r, f.dualWield)) : null;
}

const round4 = (x) => Math.round(x * 1e4) / 1e4;

// ═══════════════════════════════════════════════════════════════════
// 「零点几几」太难改 —— 百分比与倍率的读写转换
//
// 🔴 **只是给人看的写法，JSON 与引擎里存的仍是小数**（穿透 0.25、砸墙 *0.2）。
//    引擎的三段判定读的就是 0~1，绝不能因为界面好看就把它改成 0~100。
//
//   percent：显示 25%、输入 25  ⇄  存 0.25   （0~1 的比率：穿透力、亮度、治疗效率…）
//   mult   ：显示 *0.75、输入 0.75 ⇄ 存 0.75  （乘数，可以大于 1：箭矢倍率、砸墙倍率…）
//
// 为什么倍率不也做成百分比：箭的伤害倍率有 *1.35，写成 135% 很别扭；
// 而「恶化减缓 *0.5」写成 50% 更会被读反（那是"乘0.5"，不是"减少50%"）。
// ═══════════════════════════════════════════════════════════════════
const NUMERIC_TYPES = new Set(["number", "percent", "mult", "hours"]);
const isNumericCol = (col) => NUMERIC_TYPES.has(col.type);

/** 存的小数 → 输入框里给用户编辑的数（percent：0.25 → 25）。 */
function toEditable(col, v) {
  if (v === null || v === undefined || v === "") return "";
  if (col.type === "percent") return round6(Number(v) * 100);
  // hours：JSON 里存的是**分钟**（引擎的 WorkMinutes 是整数分钟），这里换算成小时给人填
  if (col.type === "hours") return Math.round(Number(v) / 60 * 100) / 100;
  return Number(v);
}

/** 用户输入的数 → 存回 JSON 的小数（percent：25 → 0.25；16.5 → 0.165，**小数不丢**）。 */
function fromEditable(col, raw) {
  const n = Number(raw);
  if (Number.isNaN(n)) return null;
  if (col.type === "percent") return round6(n / 100);
  // 🔴 hours → 分钟，且**取整**：引擎的 WorkMinutes 是 int，分钟本来就只能是整数。
  //    这不是"偷偷改用户的数"——它保证往返闭合：20 分 → 0.33 小时 → 填 0.33 → 存回 round(19.8) = 20 分 ✓
  //    （全部 18 个现有工时值都实测闭合过。）
  if (col.type === "hours") return Math.round(n * 60);
  return n;
}

/** 表格里怎么显示（percent → "25%"；mult → "*0.75"）。 */
function formatNum(col, v) {
  if (v === null || v === undefined || v === "") return "";
  if (col.type === "percent") return round6(Number(v) * 100) + "%";
  if (col.type === "mult") return "*" + Number(v);
  if (col.type === "hours") return (Math.round(Number(v) / 60 * 100) / 100) + " 小时";
  return String(v);
}

// 6 位足够（16.5% → 0.165），又能压掉 0.1*3 那类浮点毛刺
const round6 = (x) => Math.round(x * 1e6) / 1e6;

/** 这些列一变，DPS 就得跟着重算。 */
const DPS_INPUTS = new Set(["damageMin", "damageMax", "attackInterval", "burstCount", "burstInterval", "pelletCount", "twoHanded", "canDualWield"]);

/**
 * 🔴 加载时对账：JS 算的 == 引擎写下来的？对不上就说明两边的公式已经分家了。
 * 那时候**必须让用户知道**——一个悄悄算错的 DPS，比根本没有这一列更糟。
 */
function auditDps(cat) {
  if (!cat || cat.id !== "weapons") return;
  const bad = [];
  for (const r of cat.rows) {
    const engineDps = r.dps, engineDual = r.dualDps;
    const f = gripFactors();
    const mine = round4(dpsWith(r, r.twoHanded ? f.twoHanded : f.oneHanded));
    const mineDual = r.canDualWield ? round4(2 * dpsWith(r, f.dualWield)) : null;
    const off = (a, b) => (a === null || b === null) ? (a !== b) : Math.abs(a - b) > 1e-3;
    if (off(engineDps, mine) || off(engineDual, mineDual)) bad.push(r.name || r._id);
  }
  if (bad.length) {
    S.dpsBroken = bad;
    const el = $("#dps-banner");
    el.classList.remove("hidden");
    el.innerHTML =
      "<b>⚠️ 「每秒伤害」这两列不可信，别拿它调数值。</b> " +
      "网页算出来的 DPS 和引擎算的对不上（" + bad.slice(0, 4).map(esc).join("、") +
      (bad.length > 4 ? " 等 " + bad.length + " 条" : "") + "）—— " +
      "多半是引擎改了攻速/连发规则，而网页的实时预览没跟上。" +
      "<b>页面已停用实时预览，只显示引擎算的值。</b> 请让 agent 同步 <code>WeaponDps</code> 与本页的预览公式。";
  }
}

const SYNC = {
  OK: "",
  NEW: "新增·待同步进代码",
  DELETED: "删除·待同步进代码",
  BADID: "⚠️ 内部 id 有问题",
};

// ═══════════════════════════════════════════════════════════════════
// 状态
// ═══════════════════════════════════════════════════════════════════
const S = {
  online: false,          // 是否连上了本地服务（决定能不能保存）
  index: null,            // data/index.json
  cats: {},               // id → 分区数据（含 columns/rows）
  orig: {},               // id → 原始快照（用来算「哪格改了」和撤销）
  current: null,          // 当前分区 id
  icons: new Set(),       // 磁盘上现有的图标（相对路径，如 "weapons/dagger"）；不在其中就画占位框
  dpsBroken: null,        // 非空 = 网页的 DPS 预览公式与引擎已分家 ⇒ 停用实时预览，只显示引擎值
  sort: {},               // id → {key, dir}
  filters: {},            // id → {列key → 选中的值集合}
  query: "",
  showInternal: false,
  view: {},               // id → 视图模式："flat"(平表·默认) / "group"(分组二级视图) / "graph"(流程图)
  groupPick: {},          // id → 分组视图里选中的一级值（角色/模块）；null/undefined = 全部
};

// ═══════════════════════════════════════════════════════════════════
// 二级视图配置（分组视图）—— 只对声明了的分区生效，别的分区照旧只有平表
//
// primaryKey：分组视图「全部」时的分段键，也是顶部一排一级选择器的取值列（角色 / 模块）
// secondaryKey：选中某个一级值后，行内再按它分块（能力域）；null = 不再细分
// 数据契约：行的 group 字段由抽取器发；有则用、无则平表降级（并发方还没落 group 也不炸）
// ═══════════════════════════════════════════════════════════════════
const GROUP_VIEWS = {
  "character-stats": { primaryKey: "who",   primaryLabel: "角色", secondaryKey: "group" },
  "global-rules":    { primaryKey: "group", primaryLabel: "模块", secondaryKey: null },
};
const GRAPH_VIEWS = new Set(["world-graph"]);

/** 当前分区的视图模式；缺省 flat。 */
function curView() { return S.view[S.current] || "flat"; }

const $ = (sel) => document.querySelector(sel);

// ═══════════════════════════════════════════════════════════════════
// 加载：优先本地服务（可保存），退化到 bundle.js（只读）
// ═══════════════════════════════════════════════════════════════════
async function boot() {
  const served = location.protocol.startsWith("http");
  if (served) {
    try {
      S.index = await (await fetch("data/index.json", { cache: "no-store" })).json();
      S.online = true;
      try {
        S.icons = new Set((await (await fetch("api/icons", { cache: "no-store" })).json()).icons || []);
      } catch (e) {
        S.icons = new Set();   // 拿不到清单就当全都没图：一律画占位框，不发一堆 404
      }
    } catch (e) {
      S.online = false;
    }
  }
  if (!S.online) {
    if (!window.WIKI_BUNDLE) {
      $("#tablewrap").innerHTML =
        '<div class="empty-state">读不到数据。<br><br>先跑一次抽取器生成 data/：<br>' +
        '<code>~/.dotnet/dotnet run --project tools/WikiExtract</code></div>';
      setConn(false);
      return;
    }
    S.index = window.WIKI_BUNDLE.index;
    for (const [id, obj] of Object.entries(window.WIKI_BUNDLE.data)) {
      S.cats[id] = deepClone(obj);
      S.orig[id] = deepClone(obj);
    }
  }
  setConn(S.online);
  renderNav();
  await selectCat(S.index.categories[0].id);
}

function setConn(online) {
  $("#conn-dot").className = "dot " + (online ? "live" : "offline");
  $("#conn-text").textContent = online ? "本地服务已连接 · 可保存" : "离线 · 只读";
  $("#offline-banner").classList.toggle("hidden", online);
  $("#btn-save").disabled = true;
}

async function loadCat(id) {
  if (S.cats[id]) return S.cats[id];
  const meta = S.index.categories.find((c) => c.id === id);
  const obj = await (await fetch("data/" + meta.file, { cache: "no-store" })).json();
  S.cats[id] = obj;
  S.orig[id] = deepClone(obj);
  auditDps(obj);              // 🔴 引擎算的 vs 网页算的，对不上就弹横幅
  return obj;
}

const deepClone = (o) => JSON.parse(JSON.stringify(o));

// ═══════════════════════════════════════════════════════════════════
// 左侧分区（完全由 index.json 驱动 —— 加分区不用碰这里）
// ═══════════════════════════════════════════════════════════════════
function renderNav() {
  const nav = $("#nav");
  nav.innerHTML = '<div class="navhead">分区</div>';
  for (const c of S.index.categories) {
    const el = document.createElement("div");
    el.className = "navitem" + (c.id === S.current ? " active" : "");
    el.dataset.id = c.id;
    el.innerHTML =
      (isDirty(c.id) ? '<span class="pip"></span>' : "") +
      `<span>${esc(c.label)}</span><span class="count">${c.count}</span>`;
    el.onclick = () => selectCat(c.id);
    nav.appendChild(el);
  }
}

async function selectCat(id) {
  S.current = id;
  S.query = "";
  $("#q").value = "";
  await loadCat(id);
  renderNav();
  renderHead();
  renderViewSwitch();
  renderFilters();
  renderView();
}

// ═══════════════════════════════════════════════════════════════════
// 视图切换（平表 / 分组二级视图 / 流程图）——只对声明过的分区显形，别的分区不出钮
// ═══════════════════════════════════════════════════════════════════
function renderViewSwitch() {
  const box = $("#viewswitch");
  box.innerHTML = "";
  const modes = [];
  if (GROUP_VIEWS[S.current]) {
    modes.push(["flat", "平表"], ["group", "按" + GROUP_VIEWS[S.current].primaryLabel]);
  } else if (GRAPH_VIEWS.has(S.current)) {
    modes.push(["flat", "表"], ["graph", "流程图"]);
  }
  box.classList.toggle("hidden", modes.length === 0);
  if (!modes.length) return;
  const cur = curView();
  for (const [mode, label] of modes) {
    const b = document.createElement("span");
    b.className = "vbtn" + (cur === mode ? " on" : "");
    b.textContent = label;
    b.onclick = () => {
      if (curView() === mode) return;
      S.view[S.current] = mode;
      renderViewSwitch();
      renderView();
    };
    box.appendChild(b);
  }
}

/** 视图分发：切表 / 图容器，画一级选择器，再画对应视图。 */
function renderView() {
  const graph = curView() === "graph";
  $("#tablewrap").classList.toggle("hidden", graph);
  $("#graphwrap").classList.toggle("hidden", !graph);
  // 流程图下平表那套工具（新增/搜索/列筛选/内部 id）都无意义 → 藏起来，免得误导
  $("#btn-add").classList.toggle("hidden", graph);
  $("#q").classList.toggle("hidden", graph);
  $("#filters").classList.toggle("hidden", graph);
  renderPicker();
  if (graph) renderGraph();
  else renderTable();
}

// ═══════════════════════════════════════════════════════════════════
// 分组视图的一级选择器（选角色 / 选模块）——只在 group 视图下显形
// ═══════════════════════════════════════════════════════════════════
function renderPicker() {
  const box = $("#picker");
  box.innerHTML = "";
  const cfg = GROUP_VIEWS[S.current];
  const on = cfg && curView() === "group";
  box.classList.toggle("hidden", !on);
  if (!on) return;

  const c = S.cats[S.current];
  const values = [...new Set(c.rows
    .map((r) => r[cfg.primaryKey])
    .filter((v) => v !== null && v !== undefined && v !== ""))];
  const pick = S.groupPick[S.current];

  const lab = document.createElement("span");
  lab.className = "plabel";
  lab.textContent = cfg.primaryLabel + "：";
  box.appendChild(lab);

  const mk = (val, text) => {
    const chip = document.createElement("span");
    const active = (val === null && (pick === null || pick === undefined)) || val === pick;
    chip.className = "fchip" + (active ? " on" : "");
    chip.textContent = text;
    if (val !== null) chip.style.borderLeft = "3px solid " + chipColor(val);
    chip.onclick = () => {
      S.groupPick[S.current] = val;
      renderPicker();
      renderTable();
    };
    box.appendChild(chip);
  };
  mk(null, "全部");
  for (const v of values) mk(v, v);
}

function renderHead() {
  const c = S.cats[S.current];
  $("#cat-title").textContent = c.label;
  $("#cat-note").textContent = c.note || "";
  $("#cat-src").textContent = "数据来自：" + (c.source || "");
}

// ═══════════════════════════════════════════════════════════════════
// 筛选（chip 类型的列自动变成一排可点的筛选钮）
// ═══════════════════════════════════════════════════════════════════
function renderFilters() {
  const c = S.cats[S.current];
  const box = $("#filters");
  box.innerHTML = "";
  S.filters[S.current] = S.filters[S.current] || {};

  for (const col of c.columns) {
    if (col.type !== "chip" || col.internal) continue;
    // 多值串（「装甲层、裤子」）按「、」拆 token 收集 distinct：筛选钮列的是单个槽位，不是组合串
    const values = [...new Set(c.rows.flatMap((r) => splitTokens(r[col.key])))];
    if (values.length < 2 || values.length > 12) continue; // 值太少/太散都不值得做筛选
    const sel = (S.filters[S.current][col.key] = S.filters[S.current][col.key] || new Set());
    for (const v of values) {
      const chip = document.createElement("span");
      chip.className = "fchip" + (sel.has(v) ? " on" : "");
      chip.textContent = v;
      chip.style.borderLeft = "3px solid " + chipColor(v);
      chip.onclick = () => {
        sel.has(v) ? sel.delete(v) : sel.add(v);
        renderFilters();
        renderTable();
      };
      box.appendChild(chip);
    }
  }
}

// ═══════════════════════════════════════════════════════════════════
// 配色：不另立「状态文字列」，靠颜色区分（钝伤黄、锐伤红是全项目口径）
// ═══════════════════════════════════════════════════════════════════
const CHIP_COLORS = {
  "锐": "var(--rust)", "钝": "var(--amber)",
  "近战锐器": "var(--rust)", "近战钝器": "var(--amber)",
  "枪械": "var(--steel)", "弓": "var(--teal)", "弩": "var(--teal)",
  "天生武器": "var(--violet)",
  "手持": "var(--amber)", "固定": "var(--steel)",
  "子弹": "var(--steel)", "箭": "var(--teal)",
  "手术耗材": "var(--rust)", "药品": "var(--teal)", "草药原料": "var(--accent)",
  "新增·待同步进代码": "var(--accent)", "删除·待同步进代码": "var(--rust)", "⚠️ 内部 id 有问题": "var(--amber)",
  "流血": "var(--rust)", "骨折": "var(--amber)", "感染": "var(--violet)", "疾病": "var(--steel)",
};
const PALETTE = ["var(--accent)", "var(--steel)", "var(--amber)", "var(--teal)", "var(--violet)", "var(--rust)", "#9a8f6b", "#7f9ab8"];
function chipColor(v) {
  if (CHIP_COLORS[v]) return CHIP_COLORS[v];
  let h = 0;
  for (const ch of String(v)) h = (h * 31 + ch.charCodeAt(0)) >>> 0;
  return PALETTE[h % PALETTE.length];
}

// ═══════════════════════════════════════════════════════════════════
// 表
// ═══════════════════════════════════════════════════════════════════
/** 把「、」分隔的多值串拆成 token 数组（板甲「装甲层、裤子」/装备槽多值）。 */
const splitTokens = (v) => String(v == null ? "" : v).split("、").map((x) => x.trim()).filter(Boolean);

function visibleRows(noSort) {
  const c = S.cats[S.current];
  const q = S.query.trim().toLowerCase();
  const filters = S.filters[S.current] || {};

  let rows = c.rows.map((r, i) => ({ r, i }));

  for (const [key, sel] of Object.entries(filters)) {
    // 🔴 板甲一格是「装甲层、裤子」多值串：把值拆 token，与选中集有交集就命中
    //    （选「装甲层」或「裤子」都能筛出板甲，不必先立一个组合分类）
    if (sel.size) rows = rows.filter(({ r }) => splitTokens(r[key]).some((t) => sel.has(t)));
  }
  if (q) {
    rows = rows.filter(({ r }) =>
      Object.values(r).some((v) => v !== null && String(v).toLowerCase().includes(q)));
  }

  const s = noSort ? null : S.sort[S.current];
  if (s) {
    const col = c.columns.find((x) => x.key === s.key);
    rows.sort((a, b) => {
      const va = a.r[s.key], vb = b.r[s.key];
      if (va === null || va === undefined || va === "") return 1;   // 空值一律沉底
      if (vb === null || vb === undefined || vb === "") return -1;
      let d;
      if (col && isNumericCol(col)) d = Number(va) - Number(vb);
      else if (typeof va === "boolean") d = (va ? 1 : 0) - (vb ? 1 : 0);
      else d = String(va).localeCompare(String(vb), "zh-CN");
      return s.dir === "asc" ? d : -d;
    });
  }
  return rows;
}

// ── 表头拖拽重排列顺序 ──────────────────────────────────────────
// 只重排「可见、非 internal、非主键(primary)」列的相对顺序：图标列与主键列靠写死像素做左侧粘性冻结，
// 一旦被挪走粘性偏移就错位 ⇒ 它们锁死在最左、不参与拖拽。internal 列(_id/_configId/_anchor/_icon)是
// 双向联动锚点，绝不动它们在数组里的位置。重排直接改 S.cats[id].columns 的元素顺序 → 走既有 save 链
// PUT 回 data/<file>，wiki-serve.py 原样落盘 ⇒ 列序永久写回；config 投影按 configKey 认字段、与列序无关。
let _dragColKey = null;   // 当前被拖起的列 key

/** 清掉所有表头上的落点高亮（拖动过程中会在多个 th 间移动，收尾统一抹掉）。 */
function clearDropMarks() {
  document.querySelectorAll("th.col-drop-before, th.col-drop-after")
    .forEach((el) => el.classList.remove("col-drop-before", "col-drop-after"));
}

/** 把 cat.columns 里 srcKey 那一列移到 tgtKey 之前(after=false)或之后(after=true)。
 *  只搬动被拖的这一个元素；主键/internal 列的数组位置全部保持不变（splice 单元素移动不会丢锚点）。*/
function reorderColumn(cat, srcKey, tgtKey, after) {
  if (srcKey === tgtKey) return false;
  const cols = cat.columns;
  const srcIdx = cols.findIndex((c) => c.key === srcKey);
  if (srcIdx < 0) return false;
  const [moved] = cols.splice(srcIdx, 1);
  let tgtIdx = cols.findIndex((c) => c.key === tgtKey);   // splice 后重新定位目标
  if (tgtIdx < 0) { cols.splice(srcIdx, 0, moved); return false; }  // 目标没了：还原
  const at = after ? tgtIdx + 1 : tgtIdx;
  cols.splice(at, 0, moved);
  return true;
}

function renderTable() {
  const c = S.cats[S.current];
  const cfg = GROUP_VIEWS[S.current];
  const groupView = cfg && curView() === "group";
  const pick = groupView ? S.groupPick[S.current] : null;

  // 显示列：group 恒隐（它是分段依据，不是数据格）；分组视图再隐掉一级键列（who/module 冗余）
  const hidden = new Set(["group"]);
  if (groupView) hidden.add(cfg.primaryKey);
  const cols = c.columns.filter((col) => (!col.internal || S.showInternal) && !hidden.has(col.key));

  // 取行 + 定分段键：
  //  分组视图 → 自然序（不排序才能稳定分段）+ 一级过滤；选了具体一级值就按二级键分块，否则按一级键分大段
  //  平表 → 照旧吃排序；有 group 字段且没在按列排序时也插 group 分段头（排序会打乱段 ⇒ 让位给排序）
  let rows, sectionKey = null;
  if (groupView) {
    rows = visibleRows(true);
    if (pick !== null && pick !== undefined && pick !== "") {
      rows = rows.filter(({ r }) => r[cfg.primaryKey] === pick);
      sectionKey = cfg.secondaryKey;
    } else {
      sectionKey = cfg.primaryKey;
    }
  } else {
    rows = visibleRows();
    if (!S.sort[S.current] && rows.some(({ r }) => r.group)) sectionKey = "group";
  }

  const s = S.sort[S.current];
  // 一整页若全是规则/状态行，本来就不该有图标：不画一列问号误导成“缺素材”。
  const hasIcons = c.rows.some((r) => Boolean(r._icon));

  const table = document.createElement("table");
  if (!hasIcons) table.classList.add("no-icons");

  const thead = document.createElement("thead");
  const tr = document.createElement("tr");
  if (hasIcons) {
    const thIcon = document.createElement("th");
    thIcon.className = "stick0";
    thIcon.title = "图标：" + iconDir() + "/<映射路径>.png（缺图显示虚框占位）";
    thIcon.textContent = "";
    tr.appendChild(thIcon);
  }

  cols.forEach((col, ci) => {
    const th = document.createElement("th");
    th.className =
      (col.internal ? "internal " : "") +
      (isNumericCol(col) ? "num " : "") +
      (col.type === "note" ? "usernote " : "") +
      (col.primary ? "stick1" : "");
    th.textContent = col.label;
    if (col.hint) th.title = col.hint;
    if (col.readonly) th.title = (col.hint ? col.hint + "\n" : "") + "（只读：由代码推导，改这里没用）";
    if (s && s.key === col.key) {
      const a = document.createElement("span");
      a.className = "arrow";
      a.textContent = s.dir === "asc" ? "▲" : "▼";
      th.appendChild(a);
    }
    let suppressClick = false;   // 真拖过一次就吞掉紧跟的 sort click（区分点击=排序 vs 拖动=重排）
    th.onclick = () => {
      if (suppressClick) { suppressClick = false; return; }
      const cur = S.sort[S.current];
      if (!cur || cur.key !== col.key) S.sort[S.current] = { key: col.key, dir: "asc" };
      else if (cur.dir === "asc") S.sort[S.current] = { key: col.key, dir: "desc" };
      else delete S.sort[S.current];
      renderTable();
    };

    // 冻结列(图标/主键)与 internal 列锁死，不可拖；其余可见列表头可拖拽重排。
    if (!col.primary && !col.internal) {
      th.classList.add("col-draggable");
      th.draggable = true;
      th.dataset.colKey = col.key;
      th.ondragstart = (e) => {
        _dragColKey = col.key;
        suppressClick = true;
        th.classList.add("col-dragging");
        e.dataTransfer.effectAllowed = "move";
        try { e.dataTransfer.setData("text/plain", col.key); } catch (_) {}
      };
      th.ondragend = () => {
        _dragColKey = null;
        th.classList.remove("col-dragging");
        clearDropMarks();
      };
      th.ondragover = (e) => {
        if (_dragColKey === null || _dragColKey === col.key) return;
        e.preventDefault();                       // 允许 drop
        e.dataTransfer.dropEffect = "move";
        const rect = th.getBoundingClientRect();
        const after = (e.clientX - rect.left) > rect.width / 2;
        clearDropMarks();
        th.classList.add(after ? "col-drop-after" : "col-drop-before");
      };
      th.ondragleave = () => {
        th.classList.remove("col-drop-before", "col-drop-after");
      };
      th.ondrop = (e) => {
        e.preventDefault();
        e.stopPropagation();
        clearDropMarks();
        if (_dragColKey === null || _dragColKey === col.key) return;
        const rect = th.getBoundingClientRect();
        const after = (e.clientX - rect.left) > rect.width / 2;
        if (reorderColumn(S.cats[S.current], _dragColKey, col.key, after)) {
          renderTable();      // 重排后 columns 与快照的列序不同 ⇒ isDirty 判脏、保存钮点亮
        }
        _dragColKey = null;
      };
    }
    tr.appendChild(th);
  });

  // 行尾的删除钮（悬停才显形，免得一排 × 扰乱读表）
  const thDel = document.createElement("th");
  thDel.className = "delcol";
  thDel.textContent = "";
  thDel.style.cursor = "default";
  thDel.onclick = null;
  tr.appendChild(thDel);

  thead.appendChild(tr);
  table.appendChild(thead);

  const tbody = document.createElement("tbody");
  const colspan = cols.length + 1 + (hasIcons ? 1 : 0); // 删除列 + 可选图标列
  // 分段计数：段名 → 行数（表头右侧标「N 条」）
  const secCount = new Map();
  if (sectionKey) for (const { r } of rows) {
    const k = norm(r[sectionKey]);
    secCount.set(k, (secCount.get(k) || 0) + 1);
  }
  let lastSection = null, first = true;
  for (const { r, i } of rows) {
    if (sectionKey) {
      const sv = norm(r[sectionKey]);
      if (first || sv !== lastSection) {
        lastSection = sv; first = false;
        tbody.appendChild(sectionHeader(sv || "未分组", secCount.get(sv) || 0, colspan));
      }
    }
    const trow = document.createElement("tr");
    trow.dataset.i = i;
    if (rowDirty(i)) trow.classList.add("dirty");
    if (r.sync === SYNC.DELETED) trow.classList.add("tombstone");   // 待删除：划掉、变暗
    if (r.sync === SYNC.NEW || r.sync === SYNC.BADID) trow.classList.add("pending-new");

    if (hasIcons) trow.appendChild(iconCell(r));
    for (const col of cols) trow.appendChild(cellFor(col, r, i));
    trow.appendChild(deleteCell(r, i));
    tbody.appendChild(trow);
  }
  table.appendChild(tbody);

  const wrap = $("#tablewrap");
  wrap.innerHTML = "";
  if (!rows.length) {
    wrap.innerHTML = '<div class="empty-state">没有匹配的条目。</div>';
  } else {
    wrap.appendChild(table);
  }
  updateDirtyUi();
}

/** 页内分块的段头行（横跨整表宽度）。 */
function sectionHeader(label, count, colspan) {
  const trh = document.createElement("tr");
  trh.className = "grouphead";
  const td = document.createElement("td");
  td.colSpan = colspan;
  const nm = document.createElement("span");
  nm.className = "gname";
  nm.textContent = label;
  td.appendChild(nm);
  if (count) {
    const ct = document.createElement("span");
    ct.className = "gcount";
    ct.textContent = count + " 条";
    td.appendChild(ct);
  }
  trh.appendChild(td);
  return trh;
}

// ═══════════════════════════════════════════════════════════════════
// 调查点路线流程图（内联 SVG · 离线 CSP：不引任何外部图库/CDN）
//
// 节点 = world-graph 的行（place）；边 = prereq 列按「、」拆出的前置调查点。
// start 列非空 = 开局起点（描边高亮）；prereqMode「全部」= requireAll（红色虚线边）。
// 布局：按到起点的最长距离分层（DAG 纵向分层），同层横向铺开。数据零新增，纯读现有表。
// ═══════════════════════════════════════════════════════════════════
function renderGraph() {
  const c = S.cats[S.current];
  const wrap = $("#graphwrap");
  wrap.innerHTML = "";

  // 只看未被墓碑删除的行
  const nodes = c.rows.filter((r) => r.sync !== SYNC.DELETED && norm(r.place) !== "");
  if (!nodes.length) { wrap.innerHTML = '<div class="empty-state">没有可画的调查点。</div>'; return; }

  const byName = new Map(nodes.map((r) => [norm(r.place), r]));
  const prereqOf = (r) => splitTokens(r.prereq).filter((p) => byName.has(p));

  // 分层：起点(无前置/标了 start) 在第 0 层；其余取「所有前置层 + 1」的最大值（最长路径分层）
  const layer = new Map();
  const compute = (name, stack) => {
    if (layer.has(name)) return layer.get(name);
    if (stack.has(name)) return 0;                 // 防环（数据是 DAG，兜底）
    stack.add(name);
    const r = byName.get(name);
    const pres = prereqOf(r);
    const isStart = norm(r.start) !== "";
    let lv = (pres.length === 0 || isStart) ? 0 : 0;
    for (const p of pres) lv = Math.max(lv, compute(p, stack) + 1);
    stack.delete(name);
    layer.set(name, lv);
    return lv;
  };
  for (const r of nodes) compute(norm(r.place), new Set());

  // 同层内按原始行序排列
  const layers = [];
  for (const r of nodes) {
    const nm = norm(r.place), lv = layer.get(nm);
    (layers[lv] = layers[lv] || []).push(r);
  }

  // 几何
  const NW = 168, NH = 46, GAPX = 34, GAPY = 58, PADX = 20, PADY = 20;
  const rowW = (n) => n * NW + (n - 1) * GAPX;
  const maxW = Math.max(...layers.filter(Boolean).map((l) => rowW(l.length)));
  const svgW = maxW + PADX * 2;
  const svgH = layers.length * NH + (layers.length - 1) * GAPY + PADY * 2;

  // 每个节点的中心坐标
  const pos = new Map();
  layers.forEach((row, lv) => {
    if (!row) return;
    const w = rowW(row.length);
    const x0 = PADX + (maxW - w) / 2;
    row.forEach((r, idx) => {
      const x = x0 + idx * (NW + GAPX);
      const y = PADY + lv * (NH + GAPY);
      pos.set(norm(r.place), { x, y, cx: x + NW / 2 });
    });
  });

  const NS = "http://www.w3.org/2000/svg";
  const svg = document.createElementNS(NS, "svg");
  svg.setAttribute("width", svgW);
  svg.setAttribute("height", svgH);
  svg.setAttribute("viewBox", `0 0 ${svgW} ${svgH}`);

  // 箭头 marker（普通 + requireAll 各一个，取项目色）
  const defs = document.createElementNS(NS, "defs");
  const mkMarker = (id, cls) => {
    const m = document.createElementNS(NS, "marker");
    m.setAttribute("id", id);
    m.setAttribute("viewBox", "0 0 10 10");
    m.setAttribute("refX", "9"); m.setAttribute("refY", "5");
    m.setAttribute("markerWidth", "7"); m.setAttribute("markerHeight", "7");
    m.setAttribute("orient", "auto-start-reverse");
    const p = document.createElementNS(NS, "path");
    p.setAttribute("d", "M0,0 L10,5 L0,10 z");
    p.setAttribute("class", "edge-arrow" + (cls ? " " + cls : ""));
    m.appendChild(p);
    return m;
  };
  defs.appendChild(mkMarker("arrow", ""));
  defs.appendChild(mkMarker("arrow-ra", "requireall"));
  svg.appendChild(defs);

  const dangerClass = (d) => d === "低危" ? "danger-low" : d === "中危" ? "danger-mid" : d === "高危" ? "danger-high" : "";

  // 先画边（在节点下层）
  for (const r of nodes) {
    const to = pos.get(norm(r.place));
    const requireAll = norm(r.prereqMode) === "全部";
    for (const p of prereqOf(r)) {
      const from = pos.get(p);
      if (!from || !to) continue;
      const x1 = from.cx, y1 = from.y + NH, x2 = to.cx, y2 = to.y;
      const my = (y1 + y2) / 2;
      const path = document.createElementNS(NS, "path");
      path.setAttribute("d", `M${x1},${y1} C${x1},${my} ${x2},${my} ${x2},${y2}`);
      path.setAttribute("class", "edge" + (requireAll ? " requireall" : ""));
      path.setAttribute("marker-end", requireAll ? "url(#arrow-ra)" : "url(#arrow)");
      svg.appendChild(path);
    }
  }

  // 再画节点
  for (const r of nodes) {
    const nm = norm(r.place), p = pos.get(nm);
    const g = document.createElementNS(NS, "g");
    const isStart = norm(r.start) !== "";
    g.setAttribute("class", "gnode " + dangerClass(norm(r.danger)) + (isStart ? " start" : ""));
    g.setAttribute("transform", `translate(${p.x},${p.y})`);

    const rect = document.createElementNS(NS, "rect");
    rect.setAttribute("width", NW); rect.setAttribute("height", NH);
    rect.setAttribute("rx", "4");
    const tip = [nm];
    if (isStart) tip.push("起点·" + norm(r.start));
    if (norm(r.danger)) tip.push(norm(r.danger));
    if (norm(r.prereq)) tip.push("需先：" + norm(r.prereq) + (norm(r.prereqMode) === "全部" ? "（全部）" : ""));
    const title = document.createElementNS(NS, "title");
    title.textContent = tip.join(" · ");
    g.appendChild(title);
    g.appendChild(rect);

    const t1 = document.createElementNS(NS, "text");
    t1.setAttribute("class", "glabel");
    t1.setAttribute("x", NW / 2); t1.setAttribute("y", isStart ? 20 : 27);
    t1.setAttribute("text-anchor", "middle");
    t1.textContent = nm.length > 12 ? nm.slice(0, 11) + "…" : nm;
    g.appendChild(t1);

    const subBits = [];
    if (isStart) subBits.push("起点·" + norm(r.start));
    if (norm(r.danger)) subBits.push(norm(r.danger));
    if (subBits.length) {
      const t2 = document.createElementNS(NS, "text");
      t2.setAttribute("class", "gsub");
      t2.setAttribute("x", NW / 2); t2.setAttribute("y", 36);
      t2.setAttribute("text-anchor", "middle");
      t2.textContent = subBits.join(" · ");
      g.appendChild(t2);
    }
    svg.appendChild(g);
  }

  // 图例
  const legend = document.createElement("div");
  legend.className = "graph-legend";
  legend.innerHTML =
    '<span class="lk"><span class="swatch startdot"></span>开局起点</span>' +
    '<span class="lk"><span class="swatch"></span>解锁一个前置即可（任一）</span>' +
    '<span class="lk"><span class="swatch requireall"></span>需集齐全部前置（全部）</span>' +
    '<span class="lk" style="color:var(--text-mute)">悬停节点看危险度 / 前置</span>';
  wrap.appendChild(legend);
  wrap.appendChild(svg);
}

function iconDir() {
  return (S.index && S.index.iconDir) || "godot/assets/items";
}


/** 新增一条：**一律追加到末尾，不许往中间插**（CLAUDE.md 铁律：插队会打乱 Sim 的随机流）。 */
function addRow() {
  const c = S.cats[S.current];
  const row = {};
  for (const col of c.columns) {
    row[col.key] = col.type === "number" ? null : col.type === "bool" ? false : "";
  }
  row._id = freshId(c);
  row._anchor = "（新增行：代码里还没有，等 agent 建）";
  row._icon = "";
  row.sync = SYNC.NEW;

  c.rows.push(row);

  // 让新行一定看得见：清掉搜索/筛选/排序，否则它可能被过滤掉或排到别处，用户会以为没加上
  S.query = "";
  $("#q").value = "";
  S.filters[S.current] = {};
  delete S.sort[S.current];
  S.showInternal = true;              // 内部 id 是新行必须填对的东西，直接摊开给他看
  $("#show-internal").checked = true;

  renderNav();
  renderFilters();
  renderTable();

  const trs = document.querySelectorAll("tbody tr");
  const last = trs[trs.length - 1];
  if (last) {
    last.scrollIntoView({ block: "center" });
    const nameTd = last.querySelector("td.name");
    if (nameTd) nameTd.click();       // 光标直接落在名称格上，可以马上开打
  }
  toast("新行已加在末尾。填好「名称」和置灰的「内部 id」，再点保存。", "ok");
}

/** 生成一个不重复的内部 id 占位（沿用本分区现有 id 的风格：多数是小写蛇形）。 */
function freshId(c) {
  const taken = new Set(c.rows.map((r) => r._id));
  const stem = (c.id || "item").replace(/-/g, "_").replace(/s$/, "");   // weapons → weapon
  for (let n = 1; ; n++) {
    const id = `new_${stem}_${n}`;
    if (!taken.has(id)) return id;
  }
}

/** 删一行：新增的直接抹掉；代码里已有的立墓碑（再点一下可撤销）。 */
function deleteCell(r, i) {
  const td = document.createElement("td");
  td.className = "delcol";
  const btn = document.createElement("button");
  btn.className = "delbtn";

  const tomb = r.sync === SYNC.DELETED;
  btn.textContent = tomb ? "↩" : "×";
  btn.title = tomb ? "撤销删除" : "删除这一条";
  btn.onclick = (e) => {
    e.stopPropagation();
    if (tomb) {                                   // 撤销：把墓碑挖了
      r.sync = SYNC.OK;
      afterEdit();
      return;
    }
    const name = rowName(S.cats[S.current], r) || r._id || "这一条";
    const brandNew = r.sync === SYNC.NEW || r.sync === SYNC.BADID;
    const msg = brandNew
      ? `删掉新增的「${name}」？\n\n它还没进过代码，删了就没了。`
      : `删掉「${name}」？\n\n注意：这只改 JSON 设计表，**游戏里那一条还在**——\n要等 agent 把它从 C# 代码里也删掉才真的生效。\n\n在那之前它会以划掉的样子留在表里。`;
    if (!confirm(msg)) return;

    if (brandNew) {
      S.cats[S.current].rows.splice(i, 1);        // 从没同步过，直接抹掉，不留墓碑
    } else {
      r.sync = SYNC.DELETED;                      // 立墓碑，等 agent 同步
    }
    afterEdit();
  };
  td.appendChild(btn);
  return td;
}

/**
 * 一行的主键名（给确认框/报错指认是哪一条）。**读分区自己声明的 primary 列**，不写死 name/title ——
 * 各分区的主键列名并不一样（武器=名称、书籍=书名、角色数值=数值项），写死就会把主键当成"没填"。
 */
function rowName(c, r) {
  const pk = (c.columns.find((col) => col.primary) || {}).key;
  const v = pk ? r[pk] : null;
  return (v === null || v === undefined || v === "") ? "" : String(v);
}

/**
 * 保存前的 id 体检。内部 id 是**回写代码的定位锚** —— 空的、重复的、带中文的，
 * agent 就找不到该改哪一行代码，所以宁可挡下保存也不能让它存进去。
 */
function badIds() {
  const problems = [];
  for (const id of dirtyCats()) {
    const c = S.cats[id];
    const seen = new Set();
    for (const r of c.rows) {
      if (r.sync !== SYNC.NEW && r.sync !== SYNC.BADID) { seen.add(r._id); continue; }
      const v = (r._id || "").trim();
      const nm = rowName(c, r);
      const who = nm || "(未命名)";
      if (!v) problems.push(`${c.label}·${who}：内部 id 是空的`);
      else if (seen.has(v)) problems.push(`${c.label}·${who}：内部 id「${v}」和别的行重复了`);
      else if (!/^[\x20-\x7e]+$/.test(v)) problems.push(`${c.label}·${who}：内部 id「${v}」不能有中文`);
      else if (!nm) problems.push(`${c.label}：有一行新记录还没填「${primaryLabel(c)}」`);
      seen.add(v);
    }
  }
  return problems;
}

/** 本分区主键列的中文列名（「名称」/「书名」/「数值项」…），用于报错文案。 */
function primaryLabel(c) {
  const col = c.columns.find((x) => x.primary);
  return col ? col.label : "名称";
}

// 图标：每行的 `_icon` 是相对 godot/assets/items/ 的路径（如 "weapons/short_sword"），
// 由抽取器查 godot/scripts/ItemIcons.cs 这张**单一事实源**表得来（wiki 不自造 slug）。服务把 godot/assets/ 挂在 /assets/ 下。
// 素材是分批加的 ⇒ 有些条目暂时没图。故先问服务要一份**磁盘上现有的图标清单**，只给真有图的条目发 <img>：
// 否则每开一次页面就是几十个 404，把真正的报错淹了。
function iconCell(r) {
  const td = document.createElement("td");
  td.className = "icon";
  const rel = r._icon || "";

  // 显式空串 = 这行本来就不是一个有实体图标的东西（规则/状态/天生攻击型态）。
  // 留空即可，不要画问号把“无需图标”误报成“缺图”。
  if (!rel) {
    td.title = "此条目不需要图标";
    return td;
  }

  if (!S.icons.has(rel)) {
    const ph = document.createElement("div");
    ph.className = "ph";
    ph.textContent = "?";
    ph.title = "缺图标：" + iconDir() + "/" + rel + ".png";
    td.appendChild(ph);
    return td;
  }

  const img = document.createElement("img");
  img.src = "/assets/items/" + rel.split("/").map(encodeURIComponent).join("/") + ".png";
  img.alt = "";
  img.onerror = () => {   // 清单和磁盘赛跑了（刚被删掉）——照样不显示破图
    const ph = document.createElement("div");
    ph.className = "ph";
    ph.textContent = "?";
    img.replaceWith(ph);
  };
  td.appendChild(img);
  return td;
}

function cellFor(col, r, i) {
  const td = document.createElement("td");
  const v = r[col.key];
  const isNew = r.sync === SYNC.NEW || r.sync === SYNC.BADID;

  // 内部 id 平时锁死（它是回写代码的定位锚，改了 agent 就找不到该改哪一行）。
  // **唯一的例外是新增行**：那一条代码里还没有，id 得由用户/agent 现取一个，所以放开给他改。
  const idOfNewRow = col.key === "_id" && isNew;
  const editable = idOfNewRow || (!col.internal && !col.readonly);

  td.className =
    (col.internal ? "internal " : "") +
    (isNumericCol(col) ? "num " : "") +
    (col.key === "dps" || col.key === "dualDps" || col.key === "dpsVsLeather" ? "dps " : "") +
    (col.type === "note" ? "usernote " : "") +
    (col.primary ? "name sticky2 " : "") +
    (editable ? "editable " : "locked ") +
    (cellChanged(i, col.key) ? "changed " : "");

  paint(td, col, v);

  if (idOfNewRow) {
    td.title = "新增行的内部 id —— 这条代码里还没有，给它取个 id（小写英文/数字/下划线，不能重复、不能有中文）";
    td.onclick = () => edit(td, col, r, i);
  } else if (col.internal) {
    td.title = "内部 id / 代码位置 —— 勿改（回写代码时靠它定位）";
  } else if (col.readonly) {
    td.title = "只读：由代码推导，改这里不会生效";
  } else if (col.type === "multiselect") {
    td.classList.add("ms");
    td.onclick = () => editMultiselect(td, col, r);
  } else {
    td.onclick = () => edit(td, col, r, i);
    if (col.type === "bool") {
      td.onclick = () => {
        r[col.key] = !v;
        if (S.current === "weapons" && DPS_INPUTS.has(col.key) && !S.dpsBroken) recomputeDps(r);
        afterEdit();
      };
    }
  }
  return td;
}

function paint(td, col, v) {
  td.innerHTML = "";
  if (v === null || v === undefined || v === "") {
    td.classList.add("empty");
    // 备注是**写给 agent 的待办**，不是数据 ⇒ 空的时候给一句招呼，别只画一个「—」
    td.textContent = col.type === "bool" ? "" : (col.type === "note" ? "＋ 写点什么" : "—");
    if (col.type === "bool") {
      const b = document.createElement("span");
      b.className = "bool no";
      td.appendChild(b);
    }
    return;
  }
  td.classList.remove("empty");

  if (col.type === "bool") {
    const b = document.createElement("span");
    b.className = "bool " + (v ? "yes" : "no");
    b.title = v ? "是" : "否";
    td.appendChild(b);
    return;
  }
  if (col.type === "chip") {
    const c = document.createElement("span");
    const color = chipColor(v);
    c.className = "chip";
    c.style.color = color;
    c.style.borderColor = color;
    c.style.background = "transparent";
    c.textContent = v;
    td.appendChild(c);
    return;
  }
  if (col.type === "multiselect") {
    // 24 把武器名铺进格子会撑爆表格 ⇒ 只显示"已选几把 + 前几个"，点开才是完整勾选列表
    const picked = msParse(v);
    const all = msOptions(col.key);
    const c = document.createElement("span");
    c.className = "chip";
    const full = picked.length === all.length && all.length > 0;
    const color = picked.length === 0 ? "var(--text-mute)" : full ? "var(--steel)" : "var(--accent)";
    c.style.color = color;
    c.style.borderColor = color;
    c.textContent = picked.length === 0 ? "一把都装不上"
                  : full ? `全部 ${all.length} 把`
                  : `${picked.length} 把`;
    td.appendChild(c);
    const tail = document.createElement("span");
    tail.style.cssText = "color:var(--text-dim);margin-left:6px;font-size:11px";
    tail.textContent = picked.slice(0, 3).join("、") + (picked.length > 3 ? " …" : "");
    td.appendChild(tail);
    td.title = picked.join("、") || "（空）";
    return;
  }
  td.textContent = isNumericCol(col) ? formatNum(col, v) : String(v);
  if (col.type === "longtext" || col.type === "note") td.title = String(v);
}

// ═══════════════════════════════════════════════════════════════════
// 多选列（multiselect）—— 「这个改装能装在哪几把武器上」
//
// 候选项**由引擎带下来**（index.json 的 multiselectOptions），网页不硬编码武器名单
// ⇒ 加了新武器，勾选面板里自己就会多出一行。
//
// 值在 JSON 里就是一串用「、」隔开的名字（和别的列一样是纯文本）——
// 面板只是个**输入方式**，不是另一种数据格式。
// ═══════════════════════════════════════════════════════════════════
function msOptions(colKey) {
  return (S.index && S.index.multiselectOptions && S.index.multiselectOptions[colKey]) || [];
}
const msParse = (v) => String(v || "").split("、").map((x) => x.trim()).filter(Boolean);

let msPanel = null;
function closeMs() {
  if (msPanel) { msPanel.remove(); msPanel = null; }
}
document.addEventListener("click", (e) => {
  if (msPanel && !msPanel.contains(e.target) && !e.target.closest("td.ms")) closeMs();
});

function editMultiselect(td, col, r) {
  closeMs();
  const all = msOptions(col.key);
  const chosen = new Set(msParse(r[col.key]));

  const panel = document.createElement("div");
  panel.className = "mspanel";
  msPanel = panel;

  const head = document.createElement("div");
  head.className = "mshead";
  const count = document.createElement("span");
  const setCount = () => (count.textContent = `已选 ${chosen.size} / ${all.length}`);
  setCount();
  const bAll = document.createElement("button");
  bAll.textContent = "全选";
  const bNone = document.createElement("button");
  bNone.textContent = "清空";
  head.append(count, bAll, bNone);

  const list = document.createElement("div");
  list.className = "mslist";

  const redraw = () => {
    list.innerHTML = "";
    for (const name of all) {
      const row = document.createElement("label");
      row.className = "msitem" + (chosen.has(name) ? " on" : "");
      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.checked = chosen.has(name);
      cb.onchange = () => {
        cb.checked ? chosen.add(name) : chosen.delete(name);
        row.classList.toggle("on", cb.checked);
        setCount();
      };
      const t = document.createElement("span");
      t.textContent = name;
      row.append(cb, t);
      list.appendChild(row);
    }
  };
  redraw();

  bAll.onclick = () => { all.forEach((n) => chosen.add(n)); redraw(); setCount(); };
  bNone.onclick = () => { chosen.clear(); redraw(); setCount(); };

  const foot = document.createElement("div");
  foot.className = "msfoot";
  const ok = document.createElement("button");
  ok.className = "primary";
  ok.textContent = "确定";
  const cancel = document.createElement("button");
  cancel.textContent = "取消";
  foot.append(cancel, ok);

  ok.onclick = () => {
    // 按引擎给的候选顺序排（和武器表的顺序一致），不是勾选顺序
    r[col.key] = all.filter((n) => chosen.has(n)).join("、");
    closeMs();
    afterEdit();
  };
  cancel.onclick = closeMs;

  panel.append(head, list, foot);
  document.body.appendChild(panel);

  const box = td.getBoundingClientRect();
  panel.style.left = Math.min(box.left, window.innerWidth - 280) + "px";
  panel.style.top = Math.min(box.bottom + 2, window.innerHeight - 340) + "px";
}

// ═══════════════════════════════════════════════════════════════════
// 行内编辑
// ═══════════════════════════════════════════════════════════════════
let editingTd = null;

function edit(td, col, r, i) {
  if (editingTd) return;
  editingTd = td;
  const old = r[col.key];
  td.classList.add("editing");
  td.innerHTML = "";

  const long = col.type === "longtext" || col.type === "note";
  const num = isNumericCol(col);
  const input = document.createElement(long ? "textarea" : "input");
  input.className = "cell";
  if (!long) input.type = num ? "number" : "text";
  if (num) input.step = "any";
  // 百分比列：框里给他 25（不是 0.25）——"零点几几"就是这么来的
  input.value = num ? (toEditable(col, old) === "" ? "" : String(toEditable(col, old)))
                    : (old === null || old === undefined ? "" : String(old));
  if (col.type === "percent") input.title = "按百分数填：25 就是 25%（小数也行，比如 16.5）";
  if (col.type === "mult") input.title = "按倍数填：0.75 就是 *0.75，可以大于 1";
  if (col.type === "hours") input.title = "按小时填：2.5 就是两个半小时（存回代码时换算成分钟，且取整——分钟本来就只能是整数）";
  td.appendChild(input);
  input.focus();
  if (!long) input.select();

  const commit = () => {
    if (editingTd !== td) return;
    editingTd = null;
    td.classList.remove("editing");
    const raw = input.value;
    let nv;
    if (num) {
      // 🔴 存回去的永远是**小数**（用户输 25 ⇒ 存 0.25）：引擎读的就是 0~1，界面好看不能改变这一点
      nv = raw.trim() === "" ? null : fromEditable(col, raw);
      if (nv === null && raw.trim() !== "") nv = old;      // 打错了就当没改
    } else {
      nv = raw;
    }
    r[col.key] = nv;
    // 改了伤害/攻击间隔/连发/弹丸 ⇒ DPS 立刻跟着变（对账失败时不动它，只留引擎的值）
    if (S.current === "weapons" && DPS_INPUTS.has(col.key) && !S.dpsBroken) recomputeDps(r);
    afterEdit();
  };
  const cancel = () => {
    if (editingTd !== td) return;
    editingTd = null;
    td.classList.remove("editing");
    renderTable();
  };

  input.onblur = commit;
  input.onkeydown = (e) => {
    if (e.key === "Escape") { e.preventDefault(); cancel(); }
    else if (e.key === "Enter" && (!long || e.metaKey || e.ctrlKey)) { e.preventDefault(); input.blur(); }
  };
}

function afterEdit() {
  renderNav();
  renderTable();
}

// ═══════════════════════════════════════════════════════════════════
// 脏标记（拿当前值和原始快照逐格比）
// ═══════════════════════════════════════════════════════════════════
// **按 _id 匹配，不按行下标**：有了「新增/删除」之后下标会错位（新行在快照里根本没有；
// 删掉一行后面的全体前移），按下标比就会把 A 行的值拿去和 B 行的快照比，满屏乱标脏。
function origRow(catId, id) {
  const o = S.orig[catId];
  if (!o) return null;
  if (!o._byId) {                       // 建一次索引，之后 O(1)（每张表几十到几百行，重绘很频繁）
    o._byId = new Map(o.rows.map((r) => [r._id, r]));
  }
  return o._byId.get(id) || null;
}

function cellChanged(i, key) {
  const b = S.cats[S.current].rows[i];
  if (!b) return false;
  const a = origRow(S.current, b._id);
  if (!a) return false;                 // 新增行：整行都是新的，不逐格标脏（它已经有绿色的"新增"样式）
  return norm(a[key]) !== norm(b[key]);
}

function rowDirty(i) {
  const b = S.cats[S.current].rows[i];
  if (!b) return false;
  const a = origRow(S.current, b._id);
  if (!a) return true;                  // 快照里没有它 = 用户刚加的
  return Object.keys(b).some((k) => norm(a[k]) !== norm(b[k]));
}

// 列 key 的顺序签名——用于把「纯列序重排」也纳入判脏（isDirty 原来只比 rows，列序改了不会标脏、存不回）。
const colOrderSig = (cat) => (cat && cat.columns ? cat.columns.map((c) => c.key).join("") : "");

function isDirty(id) {
  if (!S.cats[id] || !S.orig[id]) return false;
  if (JSON.stringify(S.cats[id].rows) !== JSON.stringify(S.orig[id].rows)) return true;
  return colOrderSig(S.cats[id]) !== colOrderSig(S.orig[id]);   // 列顺序变了也算脏
}
const norm = (v) => (v === null || v === undefined ? "" : String(v));

function dirtyCats() {
  return Object.keys(S.cats).filter(isDirty);
}

function countDirtyCells() {
  let n = 0;
  for (const id of dirtyCats()) {
    const seen = new Set();
    for (const row of S.cats[id].rows) {
      seen.add(row._id);
      const a = origRow(id, row._id);
      if (!a) { n++; continue; }        // 新增的一行算一处改动
      for (const k of Object.keys(row)) if (norm(a[k]) !== norm(row[k])) n++;
    }
    for (const r of S.orig[id].rows) if (!seen.has(r._id)) n++;   // 被彻底删掉的行也算一处
  }
  return n;
}

function updateDirtyUi() {
  const cats = dirtyCats();
  const cells = countDirtyCells();
  // cells 只数「行/单元格」改动；纯列序重排 cells=0 但 cats 非空 ⇒ 也得点亮保存并给出提示。
  $("#dirty-summary").textContent = cells
    ? `${cells} 处改动 · ${cats.length} 个分区`
    : (cats.length ? `列顺序已改 · ${cats.length} 个分区` : "");
  $("#btn-save").disabled = !cats.length || !S.online;
  $("#btn-revert").disabled = !cats.length;
  $("#btn-save").title = !S.online && cats.length ? "没连上本地服务，存不了 —— 用「导出 JSON」" : "";
}

// ═══════════════════════════════════════════════════════════════════
// 保存 / 导出 / 撤销
// ═══════════════════════════════════════════════════════════════════
async function save() {
  const cats = dirtyCats();
  if (!cats.length) return;

  // id 体检：宁可挡下保存，也不让一个坏 id 进 JSON —— agent 靠它定位代码。
  const bad = badIds();
  if (bad.length) {
    toast("这些新增行还不能存：" + bad.join("；"), "err");
    return;
  }

  $("#btn-save").disabled = true;

  const failed = [];
  let saved = 0;
  for (const id of cats) {
    const file = S.index.categories.find((c) => c.id === id).file;
    try {
      const res = await fetch("data/" + file, {
        method: "PUT",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(S.cats[id], null, 2),
      });
      const j = await res.json().catch(() => ({}));
      if (!res.ok || !j.ok) throw new Error(j.error || `HTTP ${res.status}`);
      // 服务端投影写回 config 后重算的乐观锁版本号：更新内存，否则下次带 config 改动的保存假 409。
      if (j.configVersion != null) S.cats[id]._configVersion = j.configVersion;
      S.orig[id] = deepClone(S.cats[id]);   // 存住了才推进基线（带上刚回刷的版本号）
      saved++;
    } catch (e) {
      failed.push(`${id}: ${e.message}`);
    }
  }

  renderNav();
  renderTable();
  if (failed.length) {
    toast(`保存失败（${failed.length} 个分区）：${failed.join("；")}`, "err");
  } else {
    toast(`已保存 ${saved} 个分区 → docs/wiki/data/`, "ok");
  }
}

function exportJson() {
  const cats = dirtyCats().length ? dirtyCats() : [S.current];
  for (const id of cats) {
    const blob = new Blob([JSON.stringify(S.cats[id], null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = id + ".json";
    a.click();
    URL.revokeObjectURL(a.href);
  }
  toast(`已下载 ${cats.length} 个 json —— 覆盖到 docs/wiki/data/ 即可`, "ok");
}

function revert() {
  for (const id of dirtyCats()) S.cats[id] = deepClone(S.orig[id]);
  renderNav();
  renderTable();
  toast("已撤销全部未保存的改动", "ok");
}

let toastTimer = null;
function toast(msg, kind) {
  const t = $("#toast");
  t.textContent = msg;
  t.className = "show " + (kind || "");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => (t.className = ""), 3600);
}

const esc = (s) => String(s).replace(/[&<>"]/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;" }[c]));

// ═══════════════════════════════════════════════════════════════════
// 接线
// ═══════════════════════════════════════════════════════════════════
$("#q").oninput = (e) => { S.query = e.target.value; renderTable(); };
$("#show-internal").onchange = (e) => { S.showInternal = e.target.checked; renderTable(); };
$("#btn-save").onclick = save;
$("#btn-add").onclick = addRow;
$("#btn-export").onclick = exportJson;
$("#btn-revert").onclick = revert;

document.addEventListener("keydown", (e) => {
  if ((e.metaKey || e.ctrlKey) && e.key === "s") {
    e.preventDefault();
    if (!$("#btn-save").disabled) save();
  }
});
window.addEventListener("beforeunload", (e) => {
  if (dirtyCats().length) { e.preventDefault(); e.returnValue = ""; }
});

boot();
</script>
</body>
</html>
